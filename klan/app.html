<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Vault Expressive</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #1a73e8;
            --surface: #ffffff;
            --bg: #f0f4f8;
            --text-main: #1f1f1f;
            --shadow: 20px 20px 60px #d1d9e6, -20px -20px 60px #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Container principale con bordi squadrati e ombra profonda */
        .app-shell {
            width: 400px;
            background: var(--surface);
            box-shadow: var(--shadow);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.8);
            position: relative;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Overlay di caricamento/sfumatura */
        .glass-header {
            padding: 40px 20px;
            background: linear-gradient(135deg, var(--primary), #673ab7);
            color: white;
            text-align: center;
        }

        .glass-header h1 { margin: 0; font-size: 26px; font-weight: 800; letter-spacing: -1px; }

        .content-body { padding: 30px; }

        /* Input stile Material 3 */
        .auth-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 0px; /* Squadrati */
            font-size: 24px;
            text-align: center;
            letter-spacing: 8px;
            font-weight: 800;
            margin-bottom: 20px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        .auth-input:focus { border-color: var(--primary); outline: none; }

        .btn-action {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(26, 115, 232, 0.2);
            transition: 0.3s;
        }
        .btn-action:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(26, 115, 232, 0.3); }

        /* Area Dashboard */
        #dashboard { display: none; }

        .card {
            background: #fff;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid #f0f0f0;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.02);
            display: flex;
            align-items: center;
            gap: 15px;
            animation: slideIn 0.5s ease-out forwards;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }

        /* Navigazione */
        .nav-bar {
            display: flex;
            border-top: 1px solid #eee;
            background: #fafafa;
        }
        .nav-item {
            flex: 1;
            padding: 20px;
            text-align: center;
            color: #888;
            cursor: pointer;
            transition: 0.3s;
        }
        .nav-item.active { color: var(--primary); background: #fff; border-top: 3px solid var(--primary); }
    </style>
</head>
<body>

<div class="app-shell" id="app">
    <div class="glass-header">
        <h1 id="title">SECURE VAULT</h1>
        <p id="subtitle">Identity Authenticator</p>
    </div>

    <div class="content-body">
        <div id="login-screen">
            <input type="text" id="code-input" class="auth-input" placeholder="000000" maxlength="6">
            <button class="btn-action" onclick="unlock()">SBLOCCA SISTEMA</button>
        </div>

        <div id="dashboard">
            <div class="card"><i class="fas fa-user-circle fa-2x" style="color:var(--primary)"></i> <div><strong>Profilo:</strong> Admin Account</div></div>
            <div class="card"><i class="fas fa-file-alt fa-2x"></i> <div><strong>Documento:</strong> report_segreto.pdf</div></div>
            <div class="card"><i class="fas fa-share-alt fa-2x"></i> <div><strong>Status:</strong> Server Online h24</div></div>
        </div>
    </div>

    <div class="nav-bar" id="navbar" style="display:none">
        <div class="nav-item active"><i class="fas fa-vault"></i></div>
        <div class="nav-item"><i class="fas fa-users"></i></div>
        <div class="nav-item"><i class="fas fa-cog"></i></div>
    </div>
</div>

<script>
    function unlock() {
        const code = document.getElementById('code-input').value;
        fetch('/api/verify', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({code: code})
        })
        .then(res => {
            if(res.ok) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('navbar').style.display = 'flex';
                document.getElementById('title').innerText = "DASHBOARD";
                document.getElementById('subtitle').innerText = "Accesso Autorizzato";
            } else {
                alert("Codice Invalido!");
            }
        });
    }
</script>

</body>
</html>
